<style>
@page{size:A4;margin:0}
*{box-sizing:border-box}
body{margin:0;background:#e9e9e9;font-family:Arial,sans-serif}
.page{
 width:210mm;height:297mm;margin:10mm auto;background:#fff;
 position:relative;padding:12mm;border:3px solid #7a1f2b;
}
.page:before{
 content:"";position:absolute;inset:6mm;border:1.5px solid #7a1f2b;pointer-events:none;
}
.header{display:grid;grid-template-columns:1fr 120px 1fr;align-items:center;gap:10px}
.left h2,.right h2{margin:0;color:#7a1f2b}
.left p,.right p{margin:2px 0;font-size:12px}
.center{text-align:center}
.logo{
 width:90px;height:90px;border:2px solid #7a1f2b;border-radius:50%;
 display:flex;align-items:center;justify-content:center;
 color:#7a1f2b;font-weight:bold;margin:auto;
}
.divider{margin:10px 0;border-top:2px solid #7a1f2b;border-radius:50%}
.rx{font-size:28px;color:#7a1f2b;font-weight:bold}
.watermark{
 position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);
 font-size:120px;color:#7a1f2b;opacity:.06;font-weight:bold;user-select:none;
}
.write-area{height:180mm}
.footer{
 position:absolute;left:12mm;right:12mm;bottom:12mm;
 display:flex;justify-content:space-between;font-size:12px;color:#7a1f2b;
}
.box{border:1.5px solid #7a1f2b;border-radius:10px;padding:8px 14px;min-width:180px}
</style>
</head>
