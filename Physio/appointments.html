<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Supabase Auth Central Guard -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/auth-guard.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appointments | Lakshmi HIS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css?v=5">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .view-selector {
      display: flex;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 3px;
      width: fit-content;
      margin-bottom: 1.5rem;
    }
    .view-btn {
      padding: 0.5rem 1.25rem;
      border: none;
      background: transparent;
      color: var(--text-muted);
      border-radius: 50px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.2s ease;
    }
    .view-btn.active {
      background: var(--primary);
      color: white;
    }
    .calendar-container {
      display: none;
      margin-bottom: 2rem;
    }
    .calendar-container.active {
      display: block;
    }
    
    /* Daily Timeline Styles */
    .timeline-hour-row {
      display: flex;
      border-bottom: 1px solid var(--border);
      min-height: 80px;
    }
    .timeline-hour-label {
      width: 100px;
      padding: 1rem;
      font-weight: 700;
      color: var(--primary);
      border-right: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.1);
    }
    .timeline-hour-content {
      flex: 1;
      padding: 0.5rem 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }
    
    /* Weekly Grid Styles */
    .weekly-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .weekly-day-header {
      background: var(--bg-main);
      padding: 0.75rem;
      text-align: center;
      font-weight: 700;
      color: var(--text-main);
      border-bottom: 2px solid var(--primary);
    }
    .weekly-day-cell {
      background: rgba(0, 0, 0, 0.15);
      min-height: 180px;
      padding: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .weekly-day-cell.today {
      background: rgba(20, 184, 166, 0.05);
      border: 1px solid var(--primary);
    }
    
    /* Appointment Item Styles */
    .appt-block {
      background: rgba(255, 255, 255, 0.06);
      border-left: 3px solid var(--primary);
      padding: 0.5rem 0.75rem;
      border-radius: 4px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      max-width: 250px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      border: 1px solid var(--border);
      border-left-width: 4px;
    }
    .appt-block:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-1px);
    }
    .appt-block.Scheduled { border-left-color: #3b82f6; }
    .appt-block.Confirmed { border-left-color: #a855f7; }
    .appt-block.Completed { border-left-color: var(--success); }
    .appt-block.Cancelled { border-left-color: var(--danger); }
    .appt-block.NoShow { border-left-color: #64748b; }

    .appt-block-time {
      font-weight: 700;
      color: var(--text-main);
      font-size: 0.78rem;
    }
    .appt-block-name {
      font-weight: 600;
      color: var(--primary);
    }
    .appt-block-type {
      font-size: 0.72rem;
      color: var(--text-muted);
    }
    
    .nav-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 0.4rem 0.8rem;
      border-radius: 50px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>
<div class="cms-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand"><i data-lucide="activity"></i>Revive<span>CMS</span></div>
    <div class="sidebar-section-label">Main Menu</div>
    <nav class="sidebar-nav"></nav>
    <div class="sidebar-footer"></div>
  </aside>
  <div class="sidebar-overlay"></div>

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="mobile-sidebar-btn"><i data-lucide="menu"></i></button>
      <h1 class="page-title">Appointments</h1>
    </div>
    <div class="topbar-right">
      <button class="btn btn-primary" id="addApptBtn"><i data-lucide="plus"></i> Schedule Appointment</button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    
    <!-- Top Stats Row -->
    <div class="stats-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); margin-bottom: 1.5rem;">
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(59,130,246,0.12);color:#3b82f6;"><i data-lucide="calendar"></i></div>
        <div class="stat-info">
          <h4>Today's Total</h4>
          <h2 id="statTodayTotal">0</h2>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(168,85,247,0.12);color:#a855f7;"><i data-lucide="clock"></i></div>
        <div class="stat-info">
          <h4>Scheduled / Confirmed</h4>
          <h2 id="statPending">0</h2>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green"><i data-lucide="check-circle"></i></div>
        <div class="stat-info">
          <h4>Completed Visits</h4>
          <h2 id="statCompleted">0</h2>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red"><i data-lucide="x-circle"></i></div>
        <div class="stat-info">
          <h4>Cancelled / No Show</h4>
          <h2 id="statCancelled">0</h2>
        </div>
      </div>
    </div>

    <!-- Navigation / View Selectors -->
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; margin-bottom:1.5rem;">
      <div class="view-selector">
        <button class="view-btn active" data-view="daily">Daily View</button>
        <button class="view-btn" data-view="weekly">Weekly View</button>
        <button class="view-btn" data-view="list">All Appointments</button>
      </div>

      <div style="display:flex; align-items:center; gap:0.5rem;">
        <button class="nav-btn" id="prevPeriodBtn"><i data-lucide="chevron-left"></i></button>
        <span id="periodLabel" style="font-weight:700; font-size:1.1rem; min-width:180px; text-align:center;">â€”</span>
        <button class="nav-btn" id="nextPeriodBtn"><i data-lucide="chevron-right"></i></button>
        <button class="nav-btn" id="todayBtn" style="font-weight:600; padding:0.4rem 1rem;">Today</button>
      </div>
    </div>

    <!-- 1. Daily Calendar Timeline View -->
    <div class="calendar-container active" id="dailyViewContainer">
      <div class="card" style="padding:0;">
        <div id="dailyTimeline">
          <!-- Dynamically populated hours -->
        </div>
      </div>
    </div>

    <!-- 2. Weekly Calendar Grid View -->
    <div class="calendar-container" id="weeklyViewContainer">
      <div class="weekly-grid" id="weeklyGrid">
        <!-- Dynamically populated weekday columns -->
      </div>
    </div>

    <!-- 3. List Table View -->
    <div class="calendar-container" id="listViewContainer">
      <div class="filter-bar" style="margin-bottom:1rem;">
        <div class="search-input-wrap">
          <i data-lucide="search"></i>
          <input type="text" id="searchAppt" placeholder="Search by patient name...">
        </div>
        <select id="statusFilter" style="padding:0.7rem 1rem; border:1.5px solid var(--border); border-radius:50px; background:var(--bg-main); font-size:0.9rem;">
          <option value="">All Statuses</option>
          <option value="Scheduled">Scheduled</option>
          <option value="Confirmed">Confirmed</option>
          <option value="Completed">Completed</option>
          <option value="Cancelled">Cancelled</option>
          <option value="No Show">No Show</option>
        </select>
      </div>
      <div class="card">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Patient</th>
                <th>Date &amp; Time</th>
                <th>Type</th>
                <th>Status</th>
                <th>Notes</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="apptTableBody">
              <tr><td colspan="6"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </main>
</div>

<!-- Add / Edit Appointment Modal -->
<div class="modal-overlay" id="apptModal">
  <div class="modal" style="max-width:540px;">
    <div class="modal-header">
      <h2 id="apptModalTitle">Schedule Appointment</h2>
      <button class="modal-close"><i data-lucide="x"></i></button>
    </div>
    <div class="modal-body">
      <form id="apptForm" novalidate>
        <input type="hidden" id="apptId">
        <div class="form-grid" style="grid-template-columns: 1fr;">
          <div class="form-group">
            <label>Patient *</label>
            <select id="apptPatientId" required>
              <option value="">&mdash; Select Patient &mdash;</option>
            </select>
          </div>
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
            <div class="form-group">
              <label>Date *</label>
              <input type="date" id="apptDate" required>
            </div>
            <div class="form-group">
              <label>Time *</label>
              <input type="time" id="apptTime" required>
            </div>
          </div>
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
            <div class="form-group">
              <label>Consultation Type *</label>
              <select id="apptType" required>
                <option value="New Patient">New Patient</option>
                <option value="Review Patient">Review Patient</option>
                <option value="Emergency Patient">Emergency Patient</option>
                <option value="Physiotherapy Rehab">Physiotherapy Rehab</option>
              </select>
            </div>
            <div class="form-group">
              <label>Status *</label>
              <select id="apptStatus" required>
                <option value="Scheduled">Scheduled</option>
                <option value="Confirmed">Confirmed</option>
                <option value="Completed">Completed</option>
                <option value="Cancelled">Cancelled</option>
                <option value="No Show">No Show</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Notes / Comments</label>
            <textarea id="apptNotes" placeholder="Reason for visit, symptoms, or special instructions..."></textarea>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" data-close-modal>Cancel</button>
      <button class="btn btn-primary" id="saveApptBtn"><i data-lucide="save"></i> Save Appointment</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="js/repositories/baseRepository.js"></script>
<script src="js/repositories/patientRepository.js"></script>
<script src="js/repositories/appointmentRepository.js"></script>
<script src="js/db.js?v=10"></script>
<script src="js/utils.js?v=10"></script>
<script>
let allAppointments = [];
let allPatients = [];
let activeView = 'daily'; // 'daily' | 'weekly' | 'list'
let currentDate = new Date(); // Current viewing focus date
let editingApptId = null;

// Initialize
document.addEventListener('cms:ready', async () => {
  await loadData();
  setupEventListeners();
  renderCurrentView();
});

async function loadData() {
  allAppointments = await CMS.appointments.getAll();
  allPatients = await CMS.patients.getAll();
  
  // Populate patient dropdown
  const patientSelect = document.getElementById('apptPatientId');
  patientSelect.innerHTML = '<option value="">&mdash; Select Patient &mdash;</option>' + 
    allPatients.map(p => `<option value="${p.id}">${p.name} (${p.mobile})</option>`).join('');
  
  updateStatistics();
}

function updateStatistics() {
  const todayStr = currentDate.toISOString().split('T')[0];
  const todayAppts = allAppointments.filter(a => a.date === todayStr);
  
  document.getElementById('statTodayTotal').textContent = todayAppts.length;
  
  const pending = allAppointments.filter(a => a.status === 'Scheduled' || a.status === 'Confirmed').length;
  document.getElementById('statPending').textContent = pending;
  
  const completed = allAppointments.filter(a => a.status === 'Completed').length;
  document.getElementById('statCompleted').textContent = completed;
  
  const cancelled = allAppointments.filter(a => a.status === 'Cancelled' || a.status === 'No Show').length;
  document.getElementById('statCancelled').textContent = cancelled;
}

function setupEventListeners() {
  // View Switchers
  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeView = btn.dataset.view;
      
      document.querySelectorAll('.calendar-container').forEach(c => c.classList.remove('active'));
      document.getElementById(`${activeView}ViewContainer`).classList.add('active');
      
      renderCurrentView();
    });
  });

  // Calendar Period Navigators
  document.getElementById('prevPeriodBtn').addEventListener('click', () => {
    if (activeView === 'daily') {
      currentDate.setDate(currentDate.getDate() - 1);
    } else if (activeView === 'weekly') {
      currentDate.setDate(currentDate.getDate() - 7);
    }
    renderCurrentView();
  });
  
  document.getElementById('nextPeriodBtn').addEventListener('click', () => {
    if (activeView === 'daily') {
      currentDate.setDate(currentDate.getDate() + 1);
    } else if (activeView === 'weekly') {
      currentDate.setDate(currentDate.getDate() + 7);
    }
    renderCurrentView();
  });
  
  document.getElementById('todayBtn').addEventListener('click', () => {
    currentDate = new Date();
    renderCurrentView();
  });

  // Filters for list view
  document.getElementById('searchAppt').addEventListener('input', filterListView);
  document.getElementById('statusFilter').addEventListener('change', filterListView);

  // New Appointment Button
  document.getElementById('addApptBtn').addEventListener('click', () => {
    editingApptId = null;
    document.getElementById('apptModalTitle').textContent = 'Schedule Appointment';
    document.getElementById('apptForm').reset();
    document.getElementById('apptDate').value = currentDate.toISOString().split('T')[0];
    document.getElementById('apptTime').value = '10:00';
    document.getElementById('apptStatus').value = 'Scheduled';
    openModal('apptModal');
  });

  // Save Appointment
  document.getElementById('saveApptBtn').addEventListener('click', saveAppointment);
}

function renderCurrentView() {
  updateStatistics();
  
  // Disable Period nav buttons in List view
  const periodControls = ['prevPeriodBtn', 'nextPeriodBtn', 'todayBtn', 'periodLabel'];
  periodControls.forEach(id => {
    document.getElementById(id).style.visibility = (activeView === 'list') ? 'hidden' : 'visible';
  });

  if (activeView === 'daily') {
    renderDailyView();
  } else if (activeView === 'weekly') {
    renderWeeklyView();
  } else if (activeView === 'list') {
    renderListView(allAppointments);
  }
}

// Render Daily Timeline
function renderDailyView() {
  const dateStr = currentDate.toISOString().split('T')[0];
  document.getElementById('periodLabel').textContent = formatDate(dateStr);
  
  const dailyTimeline = document.getElementById('dailyTimeline');
  dailyTimeline.innerHTML = '';
  
  // Define clinic slots from 09:00 to 18:00
  const hours = [
    { label: '09:00 AM', hour: 9 },
    { label: '10:00 AM', hour: 10 },
    { label: '11:00 AM', hour: 11 },
    { label: '12:00 PM', hour: 12 },
    { label: '01:00 PM', hour: 13 },
    { label: '02:00 PM', hour: 14 },
    { label: '03:00 PM', hour: 15 },
    { label: '04:00 PM', hour: 16 },
    { label: '05:00 PM', hour: 17 },
    { label: '06:00 PM', hour: 18 }
  ];
  
  const dateAppts = allAppointments.filter(a => a.date === dateStr);
  
  hours.forEach(slot => {
    // Find appointments in this hour range
    const hourAppts = dateAppts.filter(a => {
      const apptHour = parseInt(a.time.split(':')[0]);
      return apptHour === slot.hour;
    });
    
    const row = document.createElement('div');
    row.className = 'timeline-hour-row';
    
    const label = document.createElement('div');
    label.className = 'timeline-hour-label';
    label.textContent = slot.label;
    
    const content = document.createElement('div');
    content.className = 'timeline-hour-content';
    
    if (hourAppts.length === 0) {
      content.innerHTML = '<span style="color:var(--text-muted);font-size:0.85rem;font-style:italic;">No appointments scheduled</span>';
    } else {
      hourAppts.forEach(appt => {
        const item = document.createElement('div');
        item.className = `appt-block ${appt.status.replace(' ', '')}`;
        item.innerHTML = `
          <span class="appt-block-time"><i data-lucide="clock" style="width:10px;height:10px;display:inline;"></i> ${appt.time}</span>
          <span class="appt-block-name">${appt.patientName}</span>
          <span class="appt-block-type">${appt.type} &middot; <strong style="color:var(--primary);">${appt.status}</strong></span>
        `;
        item.addEventListener('click', () => editAppointment(appt.id));
        content.appendChild(item);
      });
    }
    
    row.appendChild(label);
    row.appendChild(content);
    dailyTimeline.appendChild(row);
  });
  
  lucide.createIcons();
}

// Render Weekly Grid View
function renderWeeklyView() {
  // Get start of the current week (Sunday)
  const startOfWeek = new Date(currentDate);
  startOfWeek.setDate(currentDate.getDate() - currentDate.getDay());
  
  const endOfWeek = new Date(startOfWeek);
  endOfWeek.setDate(startOfWeek.getDate() + 6);
  
  const startStr = startOfWeek.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
  const endStr = endOfWeek.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
  document.getElementById('periodLabel').textContent = `${startStr} - ${endStr}`;
  
  const weeklyGrid = document.getElementById('weeklyGrid');
  weeklyGrid.innerHTML = '';
  
  const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  
  // Render headers
  for (let i = 0; i < 7; i++) {
    const dayDate = new Date(startOfWeek);
    dayDate.setDate(startOfWeek.getDate() + i);
    
    const header = document.createElement('div');
    header.className = 'weekly-day-header';
    header.innerHTML = `
      <div style="font-size:0.75rem; text-transform:uppercase; color:var(--text-muted);">${days[i]}</div>
      <div style="font-size:1.2rem; font-weight:800;">${dayDate.getDate()}</div>
    `;
    weeklyGrid.appendChild(header);
  }
  
  // Render appointment blocks per cell
  const todayStr = new Date().toISOString().split('T')[0];
  for (let i = 0; i < 7; i++) {
    const dayDate = new Date(startOfWeek);
    dayDate.setDate(startOfWeek.getDate() + i);
    const dayStr = dayDate.toISOString().split('T')[0];
    
    const cell = document.createElement('div');
    cell.className = `weekly-day-cell ${dayStr === todayStr ? 'today' : ''}`;
    
    const dayAppts = allAppointments.filter(a => a.date === dayStr);
    
    // Sort appointments by time
    dayAppts.sort((a, b) => a.time.localeCompare(b.time));
    
    if (dayAppts.length === 0) {
      cell.innerHTML = '<span style="color:var(--text-muted);font-size:0.75rem;font-style:italic;text-align:center;margin:auto;">Empty</span>';
    } else {
      dayAppts.forEach(appt => {
        const item = document.createElement('div');
        item.className = `appt-block ${appt.status.replace(' ', '')}`;
        item.style.maxWidth = '100%';
        item.style.padding = '0.3rem 0.5rem';
        item.style.fontSize = '0.78rem';
        item.innerHTML = `
          <span class="appt-block-time" style="font-size:0.7rem;">${appt.time}</span>
          <span class="appt-block-name" style="font-size:0.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${appt.patientName}</span>
          <span class="appt-block-type" style="font-size:0.65rem;">${appt.type}</span>
        `;
        item.addEventListener('click', () => editAppointment(appt.id));
        cell.appendChild(item);
      });
    }
    
    weeklyGrid.appendChild(cell);
  }
  
  lucide.createIcons();
}

// Render List Table View
function renderListView(appts) {
  const tbody = document.getElementById('apptTableBody');
  if (!appts.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><i data-lucide="calendar"></i><h3>No appointments found</h3><p>Schedule your first clinic appointment</p></div></td></tr>`;
    lucide.createIcons(); return;
  }
  
  tbody.innerHTML = appts.slice().reverse().map(a => {
    let statCls = 'badge-primary';
    if (a.status === 'Completed') statCls = 'badge-success';
    else if (a.status === 'Cancelled') statCls = 'badge-danger';
    else if (a.status === 'Confirmed') statCls = 'badge-secondary';
    else if (a.status === 'No Show') statCls = 'badge-neutral';
    
    return `
      <tr>
        <td class="td-name">${a.patientName}</td>
        <td>
          <div style="font-weight:600;">${formatDate(a.date)}</div>
          <div class="td-light" style="font-size:0.8rem;"><i data-lucide="clock" style="width:10px;height:10px;display:inline;"></i> ${a.time}</div>
        </td>
        <td class="td-light">${a.type}</td>
        <td><span class="badge ${statCls}">${a.status}</span></td>
        <td class="td-light" style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${a.note || ''}">${a.note || '&mdash;'}</td>
        <td>
          <div style="display:flex;gap:0.4rem;">
            <button class="btn btn-ghost btn-sm btn-icon" title="Edit" onclick="editAppointment('${a.id}')"><i data-lucide="edit-2"></i></button>
            <button class="btn btn-ghost btn-sm btn-icon" title="View Patient" onclick="navigateToPatient('${a.patientId}')"><i data-lucide="user"></i></button>
            <button class="btn btn-ghost btn-sm btn-icon" title="Delete" onclick="deleteAppointment('${a.id}')" style="color:var(--danger)"><i data-lucide="trash-2"></i></button>
          </div>
        </td>
      </tr>
    `;
  }).join('');
  
  lucide.createIcons();
}

function filterListView() {
  const q = document.getElementById('searchAppt').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  
  const filtered = allAppointments.filter(a => 
    (!q || a.patientName.toLowerCase().includes(q) || (a.patientId || '').toString().toLowerCase().includes(q)) &&
    (!status || a.status === status)
  );
  renderListView(filtered);
}

// Edit / Load Form for Appointment
async function editAppointment(id) {
  const parsedId = isNaN(id) ? id : parseInt(id);
  const appt = await CMS.appointments.getById(parsedId);
  editingApptId = id;
  
  document.getElementById('apptModalTitle').textContent = 'Edit Appointment';
  document.getElementById('apptPatientId').value = appt.patientId;
  document.getElementById('apptDate').value = appt.date;
  document.getElementById('apptTime').value = appt.time;
  document.getElementById('apptType').value = appt.type;
  document.getElementById('apptStatus').value = appt.status;
  document.getElementById('apptNotes').value = appt.note || '';
  
  openModal('apptModal');
}

// Save Appointment Action
async function saveAppointment() {
  const patientId = document.getElementById('apptPatientId').value;
  const date = document.getElementById('apptDate').value;
  const time = document.getElementById('apptTime').value;
  const type = document.getElementById('apptType').value;
  const status = document.getElementById('apptStatus').value;
  const note = document.getElementById('apptNotes').value;
  
  if (!patientId || !date || !time) {
    showToast('Please fill in patient, date, and time.', 'error');
    return;
  }
  
  const patient = allPatients.find(p => p.id.toString() === patientId.toString());
  if (!patient) return;
  
  const apptData = {
    patientId: patientId,
    patientName: patient.name,
    date,
    time,
    type,
    status,
    note
  };
  
  try {
    if (editingApptId) {
      await CMS.appointments.update({ ...apptData, id: editingApptId });
      showToast('Appointment rescheduled successfully!', 'success');
      
      // Auto-add visit history if completed
      if (status === 'Completed') {
        await CMS.visits.add({
          patientId: patientId,
          date,
          notes: `Appointment completed (${type}). Note: ${note || 'No specific clinical findings logged in appointments.'}`
        });
      }
    } else {
      await CMS.appointments.add(apptData);
      showToast('Appointment scheduled successfully!', 'success');
    }
    
    closeModal('apptModal');
    await loadData();
    renderCurrentView();
  } catch (err) {
    showToast('Error scheduling appointment: ' + err.message, 'error');
  }
}

async function deleteAppointment(id) {
  if (!confirm('Are you sure you want to remove this appointment?')) return;
  const parsedId = isNaN(id) ? id : parseInt(id);
  await CMS.appointments.delete(parsedId);
  showToast('Appointment removed.', 'warning');
  await loadData();
  renderCurrentView();
}

function navigateToPatient(patientId) {
  // Store patient ID in sessionStorage to open their EMR profile directly
  sessionStorage.setItem('openPatientProfileId', patientId);
  window.location.href = 'patients.html';
}

function todayISO() {
  return new Date().toISOString().split('T')[0];
}
