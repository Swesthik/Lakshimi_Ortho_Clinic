<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Revive Physiotherapy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 480px; }
    .code {
      font-size: 8rem;
      font-weight: 800;
      color: #005f73;
      line-height: 1;
      margin-bottom: 1rem;
      opacity: 0.15;
    }
    h1 { font-size: 2rem; color: #0f172a; margin-bottom: 0.75rem; }
    p { color: #475569; font-size: 1.05rem; margin-bottom: 2rem; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 2rem;
      background: #005f73;
      color: white;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1rem;
      text-decoration: none;
      transition: all 0.25s ease;
    }
    .btn:hover { background: #004b5c; transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or may have been moved.</p>
    <a href="/index.html" class="btn">← Go Back Home</a>
  </div>
  <script>
    // For GitHub Pages SPA routing: redirect properly
    const path = window.location.pathname;
    if (path && path !== '/' && path !== '/index.html') {
      const redirect = sessionStorage.redirect;
      delete sessionStorage.redirect;
      if (redirect && redirect !== location.href) {
        history.replaceState(null, null, redirect);
      }
    }
  </script>
</body>
</html>
