<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Login | ReviveCMS</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/login.css">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Supabase SDK & Login module -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/login.js"></script>
</head>
<body>
  <div class="login-container">
    <!-- Left Branding Side -->
    <div class="brand-panel">
      <div class="brand-logo-wrapper">
        <i data-lucide="activity"></i>
      </div>
      <h1>Revive<span>CMS</span></h1>
      <p>Secure Clinic Management System</p>
    </div>

    <!-- Right Authentication Side -->
    <div class="auth-panel">
      <div class="auth-card">
        <h2>Doctor Login</h2>

        <div class="error-container" id="errorContainer"></div>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
              <i data-lucide="mail"></i>
              <input type="email" id="email" class="input-control" placeholder="doctor@clinic.com" autocomplete="email">
            </div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <i data-lucide="lock"></i>
              <input type="password" id="password" class="input-control" placeholder="••••••••" autocomplete="current-password">
              <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
                <i data-lucide="eye" id="eyeIcon"></i>
              </button>
            </div>
            <a href="#" class="forgot-password-link" onclick="return false;">Forgot Password?</a>
          </div>

          <button type="submit" class="login-btn" id="loginBtn">
            <div class="spinner" id="loginSpinner"></div>
            <span id="btnText">Sign In</span>
          </button>
        </form>
      </div>

      <!-- Footer -->
      <div class="auth-footer">
        ReviveCMS Cloud Edition
      </div>
    </div>
  </div>

</body>
</html>
